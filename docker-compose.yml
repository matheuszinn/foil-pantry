version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: tinfoil_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: tinfoil
      MARIADB_USER: tinfoil
      MARIADB_PASSWORD: your_secure_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  minio:
    image: minio/minio
    container_name: tinfoil_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: your_secure_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tinfoil_downloader
    depends_on:
      - mariadb
      - minio
    stdin_open: true
    tty: true
    volumes:
      - ./config.docker.yaml:/app/config.yaml
      - ./session:/app/session

volumes:
  mariadb_data:
  minio_data:
